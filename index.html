<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Girl 💖</title>
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --soft-pink: #ffccd5;
            --bg-gradient: linear-gradient(135deg, #fff5f7 0%, #ffccd5 100%);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
            transition: background 1s ease;
        }

        .container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.6);
            z-index: 10;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { color: #d63384; font-size: 28px; margin-bottom: 30px; line-height: 1.4; }
        
        .btn-container { 
            position: relative; 
            width: 100%; 
            height: 80px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 20px;
        }

        button {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(214, 51, 132, 0.2);
        }

        #yesBtn { background: var(--primary-pink); color: white; }
        #yesBtn:hover { transform: scale(1.1); background: #ff3355; }

        #noBtn { 
            background: #6c757d; 
            color: white; 
            position: absolute;
        }

        .hidden { display: none !important; }

        .profile-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            border: 8px solid white;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.4);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .music-button {
            background: #d63384;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            margin-top: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        .heart {
            position: fixed;
            color: var(--primary-pink);
            font-size: 20px;
            animation: moveUp 4s linear infinite;
            top: 100%;
            opacity: 0.8;
        }

        @keyframes moveUp {
            to { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="mainPage" class="container">
        <img src="https://media.tenor.com/7S_6S6G8j8EAAAAi/peach-goma.gif" style="width: 120px; margin-bottom: 10px;">
        <h1 id="mainText">ပြန်ချစ်ပေးပါနော်🥺🫶</h1>
        <div class="btn-container">
            <button id="yesBtn" onclick="startEverything()">ချစ်တယ်</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">ငြင်းတယ်</button>
        </div>
    </div>

    <div id="lovePage" class="container hidden">
        <img src="6827.jpg" alt="Our Photo" class="profile-img">
        <h2 style="color: #d63384; font-size: 22px; margin-bottom: 10px;">ပြန်လာပေးတဲ့အတွက် ကျေးဇူးပါ <br> ကိုယ်ချစ်ရတဲ့ ကလေးမရယ် 🥺</h2>
        <p style="color: #d63384; font-style: italic; margin-bottom: 20px;">🎶 အတ္တကမ္ဘာကြီးထဲ</p>
        <button class="music-button" id="playBtn" onclick="playMusic()">သီချင်းဖွင့်ရန် 🎵</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById('bgMusic');

        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            document.getElementById('mainText').innerText = "မငြင်းပါနဲ့ ချစ်ပေးပါ 🥺";
            const x = Math.random() * (window.innerWidth - 120);
            const y = Math.random() * (window.innerHeight - 80);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function playMusic() {
            music.play();
            document.getElementById('playBtn').style.display = 'none';
        }

        function startEverything() {
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('lovePage').classList.remove('hidden');
            document.body.style.background = "linear-gradient(135deg, #ffccd5 0%, #ffb3c1 100%)";
            
            music.play().catch(() => { console.log("Waiting for click..."); });
            startHearts();
        }

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = "❤️";
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.fontSize = Math.random() * 20 + 10 + "px";
                heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
                document.body.appendChild(heart);
                setTimeout(() => { heart.remove(); }, 5000);
            }, 250);
        }
    </script>
</body>
</html>
