<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Girl 💖</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffeef2;
            font-family: sans-serif;
            overflow: hidden;
            text-align: center;
        }

        h1 { color: #d63384; margin-bottom: 20px; padding: 0 20px; line-height: 1.5; z-index: 10; }

        .btn-container { position: relative; width: 100%; height: 100px; z-index: 10; }

        button {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #yesBtn { background-color: #ff4d6d; color: white; }

        #noBtn {
            background-color: #6c757d;
            color: white;
            position: absolute;
            left: 50%;
            transform: translateX(50px);
        }

        .hidden { display: none; }

        /* Photo Styling from your screenshot */
        .profile-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 25px;
            border: 4px solid white;
            box-shadow: 0 0 20px #ff4d6d;
            margin-bottom: 20px;
        }

        /* Stickers */
        .sticker { width: 140px; height: auto; margin-top: 10px; }

        /* Heart Flooding */
        .heart {
            position: fixed;
            color: #ff4d6d;
            font-size: 25px;
            animation: moveUp 4s linear infinite;
            top: 100%;
            z-index: 1;
        }

        @keyframes moveUp {
            to { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        .song-title { color: #d63384; font-size: 14px; margin-top: 15px; opacity: 0.8; }
    </style>
</head>
<body>

    <!-- First Interface -->
    <div id="mainPage">
        <img src="https://media.tenor.com/7S_6S6G8j8EAAAAi/peach-goma.gif" style="width: 120px;" alt="Sticker">
        <h1 id="mainText">ပြန်ချစ်ပေပါနော်🥺🫶</h1>
        <div class="btn-container">
            <button id="yesBtn" onclick="showLove()">ချစ်တယ်</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">ငြင်းတယ်</button>
        </div>
    </div>

    <!-- Success Page -->
    <div id="lovePage" class="hidden">
        <!-- Your Photo -->
        <img src="6827.jpg" alt="Our Photo" class="profile-img">
        
        <h2 style="color: #d63384; line-height: 1.6; padding: 0 15px;">ပြန်လာပေးတဲ့အတွက် ကျေးဇူးပါ <br> ကိုယ်ချစ်ရတဲ့ ကလေးမရယ် 🥺</h2>
        
        <!-- Bubu Dudu Sticker -->
        <img src="https://media.tenor.com/vS_86_zYm94AAAAi/bubu-dudu-bubu.gif" alt="Happy Sticker" class="sticker">
        
        <p class="song-title">🎶 အတ္တကမ္ဘာကြီးထဲ</p>

        <!-- Change this source to your mp3 file name -->
        <audio id="bgMusic" loop>
            <source src="your-song-file.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const mainText = document.getElementById('mainText');
            mainText.innerText = "မငြင်းပါနဲ့ ချစ်ပေးပါ 🥺";
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 100);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function showLove() {
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('lovePage').classList.remove('hidden');
            document.body.style.backgroundColor = "#ffc1cc";
            
            const music = document.getElementById('bgMusic');
            music.play();
            
            startHearts();
        }

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = "❤️";
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
                document.body.appendChild(heart);
                setTimeout(() => { heart.remove(); }, 4000);
            }, 200);
        }
    </script>
</body>
</html>
