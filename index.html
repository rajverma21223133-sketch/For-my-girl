<!DOCTYPE html>
<!-- Version 2.0.1 - Cache Buster -->
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Girl 💖</title>
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --deep-pink: #c9184a;
            --glass: rgba(255, 255, 255, 0.7);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff0f3 0%, #ffccd5 100%);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
            transition: background 1.5s ease;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 25px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.8);
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 10;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { color: var(--deep-pink); font-size: 26px; margin-bottom: 25px; line-height: 1.4; }

        .btn-wrap {
            position: relative;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        button {
            padding: 14px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        #yesBtn { background: var(--primary-pink); color: white; }
        #yesBtn:hover { transform: scale(1.1); box-shadow: 0 12px 20px rgba(255, 77, 109, 0.4); }

        #noBtn { background: #adb5bd; color: white; position: absolute; }

        .profile-frame {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 6px solid white;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hidden { display: none !important; }

        .music-btn {
            background: var(--deep-pink);
            color: white;
            padding: 12px 24px;
            margin-top: 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            animation: pulseBtn 2s infinite;
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(201, 24, 74, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(201, 24, 74, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(201, 24, 74, 0); }
        }

        .heart {
            position: fixed;
            color: var(--primary-pink);
            top: 100%;
            pointer-events: none;
            animation: rain 4s linear infinite;
        }

        @keyframes rain {
            to { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- START PAGE -->
    <div id="mainPage" class="card">
        <img src="https://media.tenor.com/7S_6S6G8j8EAAAAi/peach-goma.gif" style="width: 110px; margin-bottom: 10px;">
        <h1>ပြန်ချစ်ပေးပါနော်🥺🫶</h1>
        <div class="btn-wrap">
            <button id="yesBtn" onclick="initiateLove()">ချစ်တယ်</button>
            <button id="noBtn" onmouseover="dodgeButton()" onclick="dodgeButton()">ငြင်းတယ်</button>
        </div>
    </div>

    <!-- REVEAL PAGE -->
    <div id="lovePage" class="card hidden">
        <div class="profile-frame">
            <img src="6827.jpg" alt="Memory" class="profile-img">
        </div>
        <h2 style="color: #c9184a; font-size: 20px; margin-bottom: 10px;">ပြန်လာပေးတဲ့အတွက် ကျေးဇူးပါ <br> ကိုယ်ချစ်ရတဲ့ ကလေးမရယ် 🥺</h2>
        <p style="color: #ff4d6d; font-size: 14px; font-weight: bold;">🎶 အတ္တကမ္ဘာကြီးထဲ</p>
        <button class="music-btn" id="playBtn" onclick="forceMusic()">သီချင်းဖွင့်ရန် 🎵</button>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById('bgMusic');

        function dodgeButton() {
            const noBtn = document.getElementById('noBtn');
            document.querySelector('h1').innerText = "မငြင်းပါနဲ့ ချစ်ပေးပါ 🥺";
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 100);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function forceMusic() {
            music.play();
            document.getElementById('playBtn').style.display = 'none';
        }

        function initiateLove() {
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('lovePage').classList.remove('hidden');
            document.body.style.background = "linear-gradient(135deg, #ffccd5 0%, #ffb3c1 100%)";
            
            // Try autoplay
            music.play().catch(() => { console.log("Manual trigger needed"); });
            
            spawnHearts();
        }

        function spawnHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = "❤️";
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.fontSize = (Math.random() * 20 + 15) + "px";
                heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
