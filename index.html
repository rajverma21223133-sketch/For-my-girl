<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Girl 💖</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffeef2;
            font-family: sans-serif;
            overflow: hidden;
            text-align: center;
        }
        h1 { color: #d63384; margin-bottom: 20px; padding: 0 20px; }
        .btn-container { position: relative; width: 100%; height: 100px; }
        button {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #yesBtn { background-color: #ff4d6d; color: white; margin-right: 10px; }
        #noBtn { background-color: #6c757d; color: white; position: absolute; }
        .hidden { display: none !important; }
        .profile-img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 0 0 25px #ff4d6d;
            margin-bottom: 20px;
        }
        .music-button {
            background-color: #d63384;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 16px;
            border: none;
            margin-top: 20px;
            z-index: 100;
        }
        .heart {
            position: fixed;
            color: #ff4d6d;
            font-size: 25px;
            animation: moveUp 4s linear infinite;
            top: 100%;
        }
        @keyframes moveUp {
            to { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="mainPage">
        <img src="https://media.tenor.com/7S_6S6G8j8EAAAAi/peach-goma.gif" style="width: 100px;">
        <h1 id="mainText">ပြန်ချစ်ပေးပါနော်🥺🫶</h1>
        <div class="btn-container">
            <button id="yesBtn" onclick="startEverything()">ချစ်တယ်</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">ငြင်းတယ်</button>
        </div>
    </div>

    <div id="lovePage" class="hidden">
        <img src="6827.jpg" alt="Our Photo" class="profile-img">
        <h2 style="color: #d63384; line-height: 1.6;">ပြန်လာပေးတဲ့အတွက် ကျေးဇူးပါ <br> ကိုယ်ချစ်ရတဲ့ ကလေးမရယ် 🥺</h2>
        <p style="color: #d63384; font-size: 14px;">🎶 အတ္တကမ္ဘာကြီးထဲ</p>
        <button class="music-button" id="playBtn" onclick="playMusic()">သီချင်းဖွင့်ရန် 🎵</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById('bgMusic');

        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            document.getElementById('mainText').innerText = "မငြင်းပါနဲ့ ချစ်ပေးပါ 🥺";
            const x = Math.random() * (window.innerWidth - 120);
            const y = Math.random() * (window.innerHeight - 80);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function playMusic() {
            music.play();
            document.getElementById('playBtn').style.display = 'none';
        }

        function startEverything() {
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('lovePage').classList.remove('hidden');
            document.body.style.backgroundColor = "#ffc1cc";
            
            // Attempt auto-play, if it fails, she can use the button
            music.play().catch(() => { console.log("Music blocked by browser"); });
            
            startHearts();
        }

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = "❤️";
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
                document.body.appendChild(heart);
                setTimeout(() => { heart.remove(); }, 4000);
            }, 300);
        }
    </script>
</body>
</html>
